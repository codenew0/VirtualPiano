<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Virtual Piano</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <h1>Virtual Piano</h1>

  <div id="controls">
    <!-- Instrument -->
    <div class="ctrl-group">
      <span class="ctrl-label">Instrument</span>
      <select id="inst-sel"></select>
    </div>

    <div class="ctrl-divider"></div>

    <!-- Keyboard size preset -->
    <div class="ctrl-group">
      <span class="ctrl-label">Keyboard size</span>
      <div class="range-row">
        <select id="keyboard-preset">
          <option value="36,60">25 Keys (C2–C4)</option>
          <option value="36,72" selected>37 Keys (C2–C5)</option>
          <option value="36,84">49 Keys (C2–C6)</option>
          <option value="36,96">61 Keys (C2–C7)</option>
          <option value="24,96">73 Keys (C1–C7)</option>
          <option value="28,103">76 Keys (E1–G7)</option>
          <option value="21,108">88 Keys (A0–C8)</option>
        </select>
      </div>
    </div>

    <input type="hidden" id="range-low" value="36">
    <input type="hidden" id="range-high" value="72">

    <div class="ctrl-group" style="justify-content:flex-end">
      <span class="range-val"><span id="lv">C2</span> – <span id="hv">C5</span></span>
      <span class="key-count" id="key-count">37 keys</span>
    </div>
  </div>

  <div id="piano-scroll">
    <div id="piano-container"></div>
  </div>

  <div id="info">
    キーボードまたはクリックで演奏 / Play with keyboard or click<br>
    <span id="last-note">&nbsp;</span>
  </div>

  <script src="js/music.js" defer></script>
  <script src="js/audio.js" defer></script>
  <script src="js/instruments.js" defer></script>
  <script src="js/range-controls.js" defer></script>
  <script src="js/piano-ui.js" defer></script>
  <script src="js/interaction.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
